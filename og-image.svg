<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040810"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ffcc" stroke-width="1" transform="translate(60,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ffcc" stroke-width="1" transform="translate(120,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ffcc" stroke-width="1" transform="translate(180,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ffcc" stroke-width="1" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ffcc" stroke-width="1" transform="translate(300,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00ffcc" stroke-width="1" transform="translate(360,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ffcc" stroke-width="1" transform="translate(0,60)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ffcc" stroke-width="1" transform="translate(0,120)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ffcc" stroke-width="1" transform="translate(0,180)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ffcc" stroke-width="1" transform="translate(0,240)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00ffcc" stroke-width="1" transform="translate(0,300)" />
  </g>
  <!-- Logo hexagon -->
  <g transform="translate(600,220) scale(0.8)">
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" fill="none" stroke="#00ffcc" stroke-width="4" opacity="0.4"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0.2"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ff3344" stroke-width="3"/>
    <circle cx="0" cy="0" r="3" fill="#ff3344"/>
  </g>
  <!-- Title -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="64" font-weight="900" letter-spacing="8" fill="white">OPENWAR</text>
  <text x="600" y="420" text-anchor="middle" font-family="Courier New, monospace" font-size="28" letter-spacing="12" fill="#00ffcc" opacity="0.85">INTELLIGENCE</text>
  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" fill="#8899aa">Real-Time Military C4ISR Dashboard | Open Source OSINT Platform</text>
  <!-- Stats bar -->
  <g transform="translate(0,520)">
    <rect x="0" y="0" width="1200" height="1" fill="#00ffcc" opacity="0.15"/>
    <text x="200" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="#00ffcc">117+</text>
    <text x="200" y="72" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="2" fill="#8899aa">AIRCRAFT</text>
    <text x="400" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="#00ffcc">49+</text>
    <text x="400" y="72" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="2" fill="#8899aa">SHIPS</text>
    <text x="600" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="#00ffcc">27</text>
    <text x="600" y="72" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="2" fill="#8899aa">NATIONS</text>
    <text x="800" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="#00ffcc">13</text>
    <text x="800" y="72" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="2" fill="#8899aa">MODULES</text>
    <text x="1000" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" fill="#00ffcc">v5.0</text>
    <text x="1000" y="72" text-anchor="middle" font-family="monospace" font-size="10" letter-spacing="2" fill="#8899aa">C4ISR</text>
  </g>
  <!-- Badge -->
  <rect x="30" y="20" width="180" height="28" rx="2" fill="none" stroke="#ff3344" stroke-width="1" opacity="0.7"/>
  <text x="120" y="39" text-anchor="middle" font-family="monospace" font-size="9" letter-spacing="3" fill="#ff3344" opacity="0.8">OPEN SOURCE</text>
  <!-- Domain -->
  <text x="1170" y="39" text-anchor="end" font-family="monospace" font-size="11" letter-spacing="2" fill="#8899aa" opacity="0.6">openwarintelligence.org</text>
</svg>